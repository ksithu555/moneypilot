<div id="erd" style="padding:8px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  households ||--o{ household_members : has
  households ||--o{ accounts : owns
  households ||--o{ categories : defines
  households ||--o{ goals : sets
  household_members }o--|| profiles : links
  accounts ||--o{ transactions : records
  transactions }o--o| receipts : scanned_from
  transactions }o--|| categories : tagged_with
  goals }o--|| categories : tracks

  households {
    uuid id PK
    string name
    string currency
    timestamp created_at
  }
  profiles {
    uuid id PK
    string display_name
    string avatar_url
  }
  household_members {
    uuid id PK
    uuid household_id FK
    uuid profile_id FK
    string role
  }
  accounts {
    uuid id PK
    uuid household_id FK
    string name
    string type
    decimal balance
  }
  categories {
    uuid id PK
    uuid household_id FK
    string name
    string type
    string color
  }
  transactions {
    uuid id PK
    uuid account_id FK
    uuid category_id FK
    uuid receipt_id FK
    decimal amount
    string type
    date txn_date
    string note
  }
  receipts {
    uuid id PK
    string storage_path
    jsonb raw_ocr
    string parse_status
    timestamp uploaded_at
  }
  goals {
    uuid id PK
    uuid household_id FK
    uuid category_id FK
    string name
    decimal target_amount
    decimal saved_amount
    date target_date
  }
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0],nums[2],nums[4],nums[6]];
  const ys = [nums[1],nums[3],nums[5],nums[7]];
  const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
  const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x);rect.setAttribute('y',y);
  rect.setAttribute('width',w);rect.setAttribute('height',h);
  rect.setAttribute('rx','8');
  for(const a of['fill','stroke','stroke-width','class','style'])
    if(firstPath.hasAttribute(a)) rect.setAttribute(a,firstPath.getAttribute(a));
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path,#erd svg .row-rect-even path').forEach(p=>p.setAttribute('stroke','none'));
</script>
